databases:
  - name: ledgerops-db
    databaseName: croodb
    user: croouser
    plan: free

services:
  - type: web
    name: ledgerops-api
    env: python
    buildCommand: "pip install -r croo_backend/requirements.txt && cd croo_backend && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "cd croo_backend && (python manage.py run_agent &) && gunicorn croo_backend.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ledgerops-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DEBUG
        value: "False"
      # These must be filled in the Render dashboard:
      # - DJANGO_SECRET_KEY
      # - ALLOWED_HOSTS
      # - CORS_ALLOWED_ORIGINS
      # - CROO_SDK_KEY
      # - CROO_API_KEY
      # - CROO_REQUESTER_SDK_KEY
      # - LEDGEROPS_AGENT_ID
      # - CROO_SERVICE_ID_DEFAULT
