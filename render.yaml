databases:
  - name: ledgerops-db
    databaseName: croodb
    user: croouser
    plan: free

services:
  - type: web
    name: ledgerops-api
    env: python
    buildCommand: "pip install -r croo_backend/requirements.txt && cd croo_backend && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "bash start.sh"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ledgerops-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173,https://ledgerops-dashboard.vercel.app"

